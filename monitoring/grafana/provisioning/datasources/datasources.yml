# Auto-provision Prometheus + Loki datasources for Grafana.
# Mounted into the Grafana container via docker-compose.production.yml.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    uid: storyforge-prometheus

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    uid: storyforge-loki
