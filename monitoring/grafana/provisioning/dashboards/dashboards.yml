# Auto-provision StoryForge dashboard from JSON file.
# Mounted into the Grafana container via docker-compose.production.yml.
apiVersion: 1

providers:
  - name: StoryForge
    orgId: 1
    folder: StoryForge
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
