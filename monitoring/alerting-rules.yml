# StoryForge Alerting Rules
# Loaded by Prometheus (referenced in prometheus.yml → rule_files)
# Docs: https://prometheus.io/docs/prometheus/latest/configuration/alerting_rules/

groups:

  # ── Availability ─────────────────────────────────────────────────────────
  - name: storyforge-availability
    interval: 30s
    rules:

      # Error rate > 10% of all requests for 5 consecutive minutes
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="storyforge", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="storyforge"}[5m]))
          ) > 0.10
        for: 5m
        labels:
          severity: critical
          team:     platform
        annotations:
          summary:     "StoryForge high HTTP error rate"
          description: "Error rate is {{ printf \"%.1f\" (mul $value 100) }}% (threshold 10%) for the past 5 minutes."
          runbook:     "https://github.com/storyforge/runbooks/blob/main/high-error-rate.md"

      # Health endpoint failing for 2 consecutive minutes
      - alert: ServiceDown
        expr: |
          up{job="storyforge"} == 0
        for: 2m
        labels:
          severity: critical
          team:     platform
        annotations:
          summary:     "StoryForge service is down"
          description: "Instance {{ $labels.instance }} has been unreachable for 2 minutes."
          runbook:     "https://github.com/storyforge/runbooks/blob/main/service-down.md"

  # ── Performance ───────────────────────────────────────────────────────────
  - name: storyforge-performance
    interval: 60s
    rules:

      # p95 API response time > 5 seconds for 5 consecutive minutes
      - alert: SlowAPIResponse
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="storyforge"}[5m])) by (le, handler)
          ) > 5
        for: 5m
        labels:
          severity: warning
          team:     platform
        annotations:
          summary:     "StoryForge slow API responses (p95)"
          description: "p95 latency on {{ $labels.handler }} is {{ printf \"%.2f\" $value }}s (threshold 5s)."

      # Container memory > 80% of its limit for 10 consecutive minutes
      - alert: HighMemoryUsage
        expr: |
          (
            container_memory_usage_bytes{name="storyforge-app"}
            /
            container_spec_memory_limit_bytes{name="storyforge-app"}
          ) > 0.80
        for: 10m
        labels:
          severity: warning
          team:     platform
        annotations:
          summary:     "StoryForge high memory usage"
          description: "Memory usage is {{ printf \"%.1f\" (mul $value 100) }}% of container limit."

  # ── Pipeline ──────────────────────────────────────────────────────────────
  - name: storyforge-pipeline
    interval: 60s
    rules:

      # Pipeline failure rate > 20% for 15 consecutive minutes
      - alert: PipelineFailureRate
        expr: |
          (
            sum(rate(storyforge_pipeline_runs_total{status="failed"}[15m]))
            /
            sum(rate(storyforge_pipeline_runs_total[15m]))
          ) > 0.20
        for: 15m
        labels:
          severity: warning
          team:     ml
        annotations:
          summary:     "StoryForge high pipeline failure rate"
          description: "Pipeline failure rate is {{ printf \"%.1f\" (mul $value 100) }}% (threshold 20%)."

      # LLM errors > 5 per minute for 5 consecutive minutes
      - alert: HighLLMErrorRate
        expr: |
          sum(rate(storyforge_llm_errors_total[5m])) > 5
        for: 5m
        labels:
          severity: critical
          team:     ml
        annotations:
          summary:     "StoryForge high LLM error rate"
          description: "LLM errors are {{ printf \"%.1f\" $value }}/min (threshold 5/min)."
          runbook:     "https://github.com/storyforge/runbooks/blob/main/llm-errors.md"
