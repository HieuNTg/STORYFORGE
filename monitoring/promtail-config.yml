server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Docker container logs via /var/log
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: storyforge
          __path__: /var/log/containers/*.log

    pipeline_stages:
      # Parse Docker JSON log format
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      # Extract container name as a label
      - json:
          expressions:
            tag:
          source: attrs
      - regex:
          expression: '(?P<container_name>[^/]+)$'
          source: tag
      - labels:
          stream:
          container_name:
      # Use the log output as the final message
      - output:
          source: output

  # Fallback: scrape syslog for host-level events
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog
