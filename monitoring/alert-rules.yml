# StoryForge Prometheus Alert Rules
# Referenced in prometheus.yml → rule_files
# Docs: https://prometheus.io/docs/prometheus/latest/configuration/alerting_rules/
#
# Severity levels:
#   critical — page on-call immediately
#   warning  — create ticket, investigate next business day

groups:

  # ── Availability ─────────────────────────────────────────────────────────────
  - name: storyforge.availability
    interval: 30s
    rules:

      # 5xx error rate > 5% of all requests for 5 consecutive minutes
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(storyforge_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(storyforge_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "StoryForge high HTTP 5xx error rate"
          description: >
            5xx error rate is {{ printf "%.1f" (mul $value 100) }}%
            (threshold 5%) over the last 5 minutes.
          runbook: "https://github.com/storyforge/runbooks/blob/main/high-error-rate.md"

      # Health endpoint failing for 1 consecutive minute
      - alert: ServiceDown
        expr: |
          up{job="storyforge"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "StoryForge service is down"
          description: >
            Instance {{ $labels.instance }} has been unreachable for 1 minute.
          runbook: "https://github.com/storyforge/runbooks/blob/main/service-down.md"

  # ── Performance ───────────────────────────────────────────────────────────────
  - name: storyforge.performance
    interval: 60s
    rules:

      # p95 response time > 5 s for 5 consecutive minutes
      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum(rate(storyforge_request_duration_seconds_bucket[5m])) by (le, path)
          ) > 5
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "StoryForge high p95 latency"
          description: >
            p95 latency on {{ $labels.path }} is {{ printf "%.2f" $value }}s
            (threshold 5 s) for the past 5 minutes.
          runbook: "https://github.com/storyforge/runbooks/blob/main/high-latency.md"

  # ── System Resources ─────────────────────────────────────────────────────────
  - name: storyforge.resources
    interval: 60s
    rules:

      # Container memory > 85% of its limit for 10 consecutive minutes
      - alert: HighMemoryUsage
        expr: |
          (
            container_memory_usage_bytes{name="storyforge-app"}
            /
            container_spec_memory_limit_bytes{name="storyforge-app"}
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "StoryForge high memory usage"
          description: >
            Memory usage is {{ printf "%.1f" (mul $value 100) }}% of the container
            limit (threshold 85%) for the last 10 minutes.

      # Host CPU usage > 90% for 10 consecutive minutes
      - alert: HighCPUUsage
        expr: |
          (
            100 - (
              avg by (instance) (
                rate(node_cpu_seconds_total{mode="idle"}[5m])
              ) * 100
            )
          ) > 90
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "StoryForge host high CPU usage"
          description: >
            CPU usage on {{ $labels.instance }} is {{ printf "%.1f" $value }}%
            (threshold 90%) for the last 10 minutes.

  # ── Dependencies ─────────────────────────────────────────────────────────────
  - name: storyforge.dependencies
    interval: 30s
    rules:

      # Redis target unreachable for 1 consecutive minute
      - alert: RedisDown
        expr: |
          up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Redis is unreachable"
          description: >
            Redis instance {{ $labels.instance }} has been down for 1 minute.
            Rate limiting and caching are non-functional.
          runbook: "https://github.com/storyforge/runbooks/blob/main/redis-down.md"

      # Redis connection errors rising (client-side, reported by app metrics)
      - alert: RedisConnectionFailures
        expr: |
          sum(rate(storyforge_redis_errors_total[5m])) > 1
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "StoryForge Redis connection failures"
          description: >
            Redis connection error rate is {{ printf "%.2f" $value }}/s
            (threshold 1/s) for the last 2 minutes.

      # PostgreSQL connection pool at or above saturation threshold
      # Uses pg_stat_activity; adjust pool_size to match your pgBouncer / asyncpg config.
      - alert: DatabasePoolExhaustion
        expr: |
          (
            pg_stat_activity_count{datname="storyforge", state="active"}
            /
            pg_settings_max_connections
          ) > 0.85
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "PostgreSQL connection pool near exhaustion"
          description: >
            Active connections are {{ printf "%.1f" (mul $value 100) }}% of
            max_connections (threshold 85%) for the last 5 minutes.
          runbook: "https://github.com/storyforge/runbooks/blob/main/db-pool-exhaustion.md"

  # ── Pipeline ─────────────────────────────────────────────────────────────────
  - name: storyforge.pipeline
    interval: 60s
    rules:

      # Pipeline failure rate > 20% for 15 consecutive minutes
      - alert: PipelineFailureRate
        expr: |
          (
            sum(rate(storyforge_pipeline_runs_total{status="failed"}[15m]))
            /
            sum(rate(storyforge_pipeline_runs_total[15m]))
          ) > 0.20
        for: 15m
        labels:
          severity: warning
          team: ml
        annotations:
          summary: "StoryForge high pipeline failure rate"
          description: >
            Pipeline failure rate is {{ printf "%.1f" (mul $value 100) }}%
            (threshold 20%) for the last 15 minutes.

      # LLM errors > 5 per second for 5 consecutive minutes
      - alert: HighLLMErrorRate
        expr: |
          sum(rate(llm_errors_total[5m])) > 5
        for: 5m
        labels:
          severity: critical
          team: ml
        annotations:
          summary: "StoryForge high LLM error rate"
          description: >
            LLM errors are {{ printf "%.2f" $value }}/s (threshold 5/s)
            for the last 5 minutes.
          runbook: "https://github.com/storyforge/runbooks/blob/main/llm-errors.md"
