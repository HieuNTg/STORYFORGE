# StoryForge Nginx Configuration
# Handles: HTTP→HTTPS redirect, reverse proxy, static files, security headers
# Requires: ssl-params.conf, Let's Encrypt certs at /etc/letsencrypt/

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;  # Hide nginx version

    # Client limits
    client_max_body_size 10M;
    client_body_timeout  60s;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        font/ttf
        image/svg+xml;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=pipeline:10m rate=2r/s;
    limit_req_status 429;

    # ── Upstream ──────────────────────────────────────────────────────────────
    # ip_hash ensures sticky sessions — required for SSE pipeline streaming
    # when running multiple app instances (docker compose --scale app=N).
    # Each client IP is consistently routed to the same app instance.
    upstream storyforge_app {
        ip_hash;
        server app:7860;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ${NGINX_SERVER_NAME:-storyforge.example.com};

        # SSL certificate (Let's Encrypt — update domain path)
        ssl_certificate     /etc/letsencrypt/live/${NGINX_SERVER_NAME:-storyforge.example.com}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${NGINX_SERVER_NAME:-storyforge.example.com}/privkey.pem;

        # TLS hardening (shared params)
        include /etc/nginx/ssl-params.conf;

        # ── Security Headers ─────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"           always;
        add_header X-Content-Type-Options    "nosniff"              always;
        add_header X-XSS-Protection          "1; mode=block"        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        # CSP managed by FastAPI middleware — see middleware/security_headers.py

        # ── Static Web Assets ────────────────────────────────────────────────
        location /web/ {
            alias /usr/share/nginx/html/web/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri $uri/ /web/index.html;
        }

        # Serve root as web app
        location = / {
            root /usr/share/nginx/html;
            try_files /web/index.html =404;
        }

        # ── API Proxy (standard endpoints) ──────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://storyforge_app;
            proxy_http_version 1.1;

            # Standard proxy headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket / SSE support
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffering off for SSE streams
            proxy_buffering    off;
            proxy_cache        off;
        }

        # ── Pipeline endpoints (long-running, up to 5 min) ───────────────────
        location ~ ^/api/(generate|pipeline|story) {
            limit_req zone=pipeline burst=5 nodelay;

            proxy_pass         http://storyforge_app;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE / streaming headers
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Extended timeouts for long-running pipeline tasks
            proxy_connect_timeout 10s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;

            proxy_buffering off;
            proxy_cache     off;
        }

        # ── Health check (no auth/logging needed) ────────────────────────────
        location = /api/health {
            proxy_pass http://storyforge_app/api/health;
            access_log off;
        }

        # ── Rate limit error response ─────────────────────────────────────────
        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error": "Rate limit exceeded. Try again later."}';
        }
    }

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
}
