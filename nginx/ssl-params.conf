# StoryForge SSL/TLS Hardening Parameters
# Included by nginx.conf server block
# Based on Mozilla SSL Configuration Generator (Intermediate profile)
# https://ssl-config.mozilla.org/

# ── Protocol ──────────────────────────────────────────────────────────────────
# TLS 1.2 minimum; TLS 1.3 preferred
ssl_protocols TLSv1.2 TLSv1.3;

# ── Cipher Suites ─────────────────────────────────────────────────────────────
# TLS 1.3 ciphers are negotiated automatically — only TLS 1.2 listed below
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;  # Let client choose among safe ciphers (TLS 1.3 best practice)

# ── Session ───────────────────────────────────────────────────────────────────
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;  # Disable for forward secrecy

# ── DH Parameters ─────────────────────────────────────────────────────────────
# Generate with: openssl dhparam -out /etc/nginx/dhparam.pem 2048
# Increase to 4096 for higher security (slower handshake)
ssl_dhparam /etc/nginx/dhparam.pem;

# ── OCSP Stapling ─────────────────────────────────────────────────────────────
# Reduces client latency by bundling OCSP response with TLS handshake
ssl_stapling        on;
ssl_stapling_verify on;
ssl_trusted_certificate /etc/letsencrypt/live/${NGINX_SERVER_NAME:-storyforge.example.com}/chain.pem;

# Use public DNS resolvers for OCSP validation
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;
