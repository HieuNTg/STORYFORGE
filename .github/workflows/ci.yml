name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install ruff
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check . --select E,F,W --ignore E501 --exclude vendor/

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit
      - name: Run pip-audit
        run: pip-audit --strict --desc

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    env:
      STORYFORGE_SECRET_KEY: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-asyncio pip-audit sqlalchemy aiosqlite numpy==1.26.4
      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_e2e_pipeline.py \
            --ignore=tests/test_phase1_storyforge.py \
            --ignore=tests/test_phase2_ui.py \
            --ignore=tests/test_xtts_provider.py \
            --ignore=tests/benchmarks/ \
            -v --tb=short \
            --cov=pipeline --cov=services --cov=api --cov=middleware --cov=errors --cov=models \
            --cov-report=term-missing --cov-report=html \
            --cov-fail-under=70
      - name: Enforce per-module coverage
        # Hard-fail at achievable thresholds; raise incrementally as coverage improves.
        # Long-term targets: services/llm=80%, pipeline=75%, api=70%
        run: |
          echo "=== Per-module coverage gates ==="
          coverage report --include="services/llm/*" --fail-under=65
          coverage report --include="pipeline/*" --fail-under=65
          coverage report --include="api/*" --fail-under=65
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  frontend-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      - name: TypeScript type check
        run: npm run typecheck
      - name: Run Vitest frontend tests with coverage
        run: npm run test -- --coverage
      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: coverage/

  db-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: storyforge
          POSTGRES_PASSWORD: test
          POSTGRES_DB: storyforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://storyforge:test@localhost:5432/storyforge_test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - run: pip install -r requirements.txt -r requirements-test.txt
      - run: pytest tests/test_db_integration.py -v --tb=short

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [db-tests]
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379/0
      STORYFORGE_SECRET_KEY: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - run: pip install -r requirements.txt -r requirements-test.txt
      - run: |
          pytest tests/test_e2e_pipeline.py -v --tb=short \
            --cov=pipeline --cov=services --cov=api \
            --cov-report=term-missing --cov-report=html:htmlcov-e2e
      - name: Upload E2E coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-report
          path: htmlcov-e2e/

  docker-build:
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t storyforge:ci-${{ github.sha }} .
      - name: Verify container starts
        run: |
          docker run -d --name sf-test -p 7860:7860 \
            -e STORYFORGE_SECRET_KEY=ci-test-only \
            storyforge:ci-${{ github.sha }}
          sleep 5
          curl -sf http://localhost:7860/api/health || (docker logs sf-test && exit 1)
          docker stop sf-test

