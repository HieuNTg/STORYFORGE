name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install ruff
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check . --select E,F,W --ignore E501 --exclude vendor/

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-asyncio
      - name: Run unit tests
        run: python -m pytest tests/ --ignore=tests/test_e2e_pipeline.py -v --tb=short --cov=. --cov-report=term-missing

  e2e-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-asyncio
      - name: Run E2E tests
        run: python -m pytest tests/test_e2e_pipeline.py -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: storyforge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  staging-deploy:
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/master'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Staging deployment ready."
          echo "To deploy manually: docker compose -f docker-compose.staging.yml up -d --build"
          echo "Staging URL: http://localhost:7861"
