name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install ruff
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check . --select E,F,W --ignore E501 --exclude vendor/

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit
      - name: Run pip-audit
        run: pip-audit --strict --desc

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    env:
      STORYFORGE_SECRET_KEY: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-asyncio pip-audit sqlalchemy aiosqlite numpy==1.26.4
      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_e2e_pipeline.py \
            --ignore=tests/test_db_integration.py \
            --ignore=tests/test_mutation_smoke.py \
            --ignore=tests/test_phase1_storyforge.py \
            --ignore=tests/test_phase2_ui.py \
            --ignore=tests/test_xtts_provider.py \
            --ignore=tests/benchmarks/ \
            -v --tb=short \
            --cov=pipeline --cov=services --cov=api --cov=middleware --cov=errors --cov=models \
            --cov-report=term-missing --cov-report=html \
            --cov-fail-under=60
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  frontend-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: TypeScript type check
        run: npm run typecheck
      - name: Run Vitest frontend tests
        run: npm test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: lint
    env:
      STORYFORGE_SECRET_KEY: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-asyncio numpy==1.26.4
      - name: Run E2E tests
        run: python -m pytest tests/test_e2e_pipeline.py -v --tb=short --no-cov

  docker:
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, frontend-tests, security]
    if: github.ref == 'refs/heads/master'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/storyforge:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/storyforge:edge
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  staging-deploy:
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/master'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          # Skip if no staging secrets configured
          if [ -z "$DEPLOY_HOST" ]; then
            echo "⚠️ Staging secrets not configured. Skipping deployment."
            echo "Configure STAGING_HOST, STAGING_USER, STAGING_SSH_KEY in GitHub environment 'staging'"
            exit 0
          fi
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # Deploy via SSH
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" << 'DEPLOY_SCRIPT'
            cd /opt/storyforge
            git pull origin master
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d --remove-orphans
            docker compose -f docker-compose.staging.yml ps
          DEPLOY_SCRIPT

  release:
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, security]
    # Only run on version tags (e.g. v1.0.0)
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Authenticate with GitHub Container Registry using the built-in token
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # Build and push versioned image to ghcr.io/<owner>/storyforge:<tag>
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/storyforge:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/storyforge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Generate changelog from conventional commits since the previous tag
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-decorate)
          else
            LOG=$(git log --oneline --no-decorate)
          fi

          # Bucket commits by conventional-commit prefix
          FEAT=$(echo "$LOG"   | grep -E '^[0-9a-f]+ feat'     || true)
          FIX=$(echo "$LOG"    | grep -E '^[0-9a-f]+ fix'      || true)
          SECURITY=$(echo "$LOG" | grep -E '^[0-9a-f]+ security' || true)
          DOCS=$(echo "$LOG"   | grep -E '^[0-9a-f]+ docs'     || true)
          INFRA=$(echo "$LOG"  | grep -E '^[0-9a-f]+ (infra|ci|chore|refactor|test)' || true)

          {
            echo "CHANGELOG<<EOF"
            echo "## What's Changed in ${{ github.ref_name }}"
            echo ""
            [ -n "$FEAT" ]     && echo "### Added"    && echo "$FEAT"     && echo ""
            [ -n "$FIX" ]      && echo "### Fixed"    && echo "$FIX"      && echo ""
            [ -n "$SECURITY" ] && echo "### Security" && echo "$SECURITY" && echo ""
            [ -n "$DOCS" ]     && echo "### Docs"     && echo "$DOCS"     && echo ""
            [ -n "$INFRA" ]    && echo "### Infra / Chore" && echo "$INFRA" && echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Create a GitHub Release and attach the generated changelog as release notes
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: StoryForge ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
