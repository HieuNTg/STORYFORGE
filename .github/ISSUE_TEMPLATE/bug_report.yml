name: Bug Report
description: Report a bug or unexpected behavior in StoryForge
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible to help us reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I click 'Run Pipeline', the page shows an error after the story generation step completes..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to Settings and configure OpenAI provider
        2. Create a new story with genre "Fantasy"
        3. Click "Run Pipeline"
        4. See error in the Drama Simulation step
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or logs.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Docker (Linux container)
        - Docker (Windows container)
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Output of `python --version`
      placeholder: "Python 3.11.4"
    validations:
      required: true

  - type: input
    id: storyforge-version
    attributes:
      label: StoryForge Version / Commit
      description: Git commit SHA or release tag (run `git rev-parse --short HEAD`)
      placeholder: "a1b2c3d or v1.2.0"
    validations:
      required: false

  - type: dropdown
    id: llm-provider
    attributes:
      label: LLM Provider
      description: Which AI provider were you using when the bug occurred?
      options:
        - OpenAI
        - Google Gemini
        - Anthropic
        - OpenRouter
        - Ollama (local)
        - Custom endpoint
        - Other / Not applicable
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Logs
      description: Paste relevant log output or attach screenshots. Logs are in `storyforge.log`.
    validations:
      required: false
