name: Feature Request
description: Suggest a new feature or improvement for StoryForge
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make StoryForge better? We'd love to hear it. Please describe your proposal clearly so we can discuss it.

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you'd like to see.
      placeholder: "Add support for exporting stories as Markdown files in addition to PDF and EPUB..."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the problem this feature solves or the workflow it enables. Who benefits and how?
      placeholder: "I want to publish my stories on platforms like GitHub Pages or Notion, which accept Markdown but not EPUB..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: If you have a specific implementation in mind, describe it here. Otherwise leave blank.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or alternative approaches? What are their limitations?
    validations:
      required: false
