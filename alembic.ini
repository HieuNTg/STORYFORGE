# Alembic configuration for StoryForge PostgreSQL migrations.
# DATABASE_URL is read from the environment in alembic/env.py — the
# sqlalchemy.url value here is only a placeholder that env.py overrides.

[alembic]
# Path to the migrations directory
script_location = alembic

# Migration filename template: timestamp prefix + slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Placeholder URL — overridden dynamically in env.py via DATABASE_URL env var
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/storyforge

# Timezone used for %%(year)d etc. in file_template (UTC recommended)
timezone = UTC

# Max length of the auto-generated slug
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
