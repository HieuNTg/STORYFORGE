# StoryForge Production Docker Compose
# Usage: docker compose -f docker-compose.production.yml up -d
# Required env file: .env.production (copy from .env.production.example)

version: "3.8"

networks:
  storyforge-network:
    driver: bridge

volumes:
  storyforge-pg-data:
    driver: local
  storyforge-redis-data:
    driver: local

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: storyforge-postgres
    restart: unless-stopped
    networks:
      - storyforge-network
    volumes:
      - storyforge-pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: storyforge
      POSTGRES_USER: storyforge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyforge -d storyforge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: storyforge-redis
    restart: unless-stopped
    networks:
      - storyforge-network
    volumes:
      - storyforge-redis-data:/data
    # Append-only persistence for durability
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── StoryForge App ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storyforge-app
    restart: unless-stopped
    networks:
      - storyforge-network
    # Internal only — nginx handles external traffic
    expose:
      - "7860"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./assets:/app/assets
    environment:
      # Database
      DATABASE_URL: postgresql://storyforge:${DB_PASSWORD}@postgres:5432/storyforge
      # Cache
      REDIS_URL: redis://redis:6379/0
      # Security
      STORYFORGE_SECRET_KEY: ${SECRET_KEY}
      STORYFORGE_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      # LLM backend
      STORYFORGE_API_KEY: ${STORYFORGE_API_KEY}
      STORYFORGE_BASE_URL: ${STORYFORGE_BASE_URL:-https://api.openai.com/v1}
      STORYFORGE_MODEL: ${STORYFORGE_MODEL:-gpt-4o-mini}
      STORYFORGE_BACKEND: ${STORYFORGE_BACKEND:-api}
      STORYFORGE_TEMPERATURE: ${STORYFORGE_TEMPERATURE:-0.8}
      # Feature flags
      STORYFORGE_QUALITY_GATE: ${STORYFORGE_QUALITY_GATE:-true}
      STORYFORGE_SMART_REVISION: ${STORYFORGE_SMART_REVISION:-true}
      STORYFORGE_AGENT_DEBATE: ${STORYFORGE_AGENT_DEBATE:-false}
      # Runtime
      PYTHONUNBUFFERED: "1"
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/api/health')"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── Nginx 1.25 ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: storyforge-nginx
    restart: unless-stopped
    networks:
      - storyforge-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl-params.conf:/etc/nginx/ssl-params.conf:ro
      # SSL certificates — mount from host (Let's Encrypt / manual)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Static web assets
      - ./web:/usr/share/nginx/html/web:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
