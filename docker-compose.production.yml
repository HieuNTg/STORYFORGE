# StoryForge Production Docker Compose
# Usage: docker compose -f docker-compose.production.yml up -d
# Required env file: .env.production (copy from .env.production.example)
#
# HORIZONTAL SCALING:
#   docker compose -f docker-compose.production.yml up -d --scale app=3
#
# Prerequisites for multi-instance:
#   - REDIS_URL must be set (shared rate limiting, token revocation, session state)
#   - DATABASE_URL must be set (shared persistent storage)
#   - LLM cache remains per-instance (SQLite) — acceptable for cache (not shared state)
#   - ChromaDB (RAG) runs embedded per-instance — mount shared volume or use external
#   - Pipeline orchestrators are per-instance — use sticky sessions (nginx ip_hash)

version: "3.8"

networks:
  storyforge-network:
    driver: bridge

volumes:
  storyforge-pg-data:
    driver: local
  storyforge-redis-data:
    driver: local
  loki-data:
    driver: local

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: storyforge-postgres
    restart: unless-stopped
    networks:
      - storyforge-network
    volumes:
      - storyforge-pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: storyforge
      POSTGRES_USER: storyforge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyforge -d storyforge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: storyforge-redis
    restart: unless-stopped
    networks:
      - storyforge-network
    volumes:
      - storyforge-redis-data:/data
    # Append-only persistence + password auth for production security
    command: redis-server --appendonly yes --appendfsync everysec --requirepass ${REDIS_PASSWORD}
    environment:
      # REDISCLI_AUTH avoids exposing the password in `docker inspect` healthcheck args
      - REDISCLI_AUTH=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── StoryForge App ─────────────────────────────────────────────────────────
  # Horizontally scalable: `docker compose up -d --scale app=N`
  # Requires: REDIS_URL for shared state, sticky sessions in nginx for SSE
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # No container_name — allows --scale app=N
    restart: unless-stopped
    networks:
      - storyforge-network
    # Internal only — nginx handles external traffic
    expose:
      - "7860"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./assets:/app/assets
    environment:
      # Database
      DATABASE_URL: postgresql://storyforge:${DB_PASSWORD}@postgres:5432/storyforge
      # Redis — REQUIRED for multi-instance (rate limiting, token revocation)
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # Security
      STORYFORGE_SECRET_KEY: ${SECRET_KEY}
      STORYFORGE_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      STORYFORGE_JWT_KEY_DIR: /app/data/jwt_keys
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-172.16.0.0/12}
      # LLM backend
      STORYFORGE_API_KEY: ${STORYFORGE_API_KEY}
      STORYFORGE_BASE_URL: ${STORYFORGE_BASE_URL:-https://api.openai.com/v1}
      STORYFORGE_MODEL: ${STORYFORGE_MODEL:-gpt-4o-mini}
      STORYFORGE_BACKEND: ${STORYFORGE_BACKEND:-api}
      STORYFORGE_TEMPERATURE: ${STORYFORGE_TEMPERATURE:-0.8}
      # Feature flags
      STORYFORGE_QUALITY_GATE: ${STORYFORGE_QUALITY_GATE:-true}
      STORYFORGE_SMART_REVISION: ${STORYFORGE_SMART_REVISION:-true}
      STORYFORGE_AGENT_DEBATE: ${STORYFORGE_AGENT_DEBATE:-false}
      STORYFORGE_LITE_MODE: ${STORYFORGE_LITE_MODE:-false}
      # Runtime
      PYTHONUNBUFFERED: "1"
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/api/health')"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── Nginx 1.25 ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: storyforge-nginx
    restart: unless-stopped
    networks:
      - storyforge-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl-params.conf:/etc/nginx/ssl-params.conf:ro
      # SSL certificates — mount from host (Let's Encrypt / manual)
      - ./nginx/ssl:/etc/letsencrypt:ro
      # Static web assets
      - ./web:/usr/share/nginx/html/web:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

  # ── Loki (log aggregation) ─────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: storyforge-loki
    ports:
      # Security: monitoring ports bound to localhost only — Loki auth_enabled is false
      - "127.0.0.1:3100:3100"
    volumes:
      - loki-data:/loki
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - storyforge-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── Promtail (log shipper) ─────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: storyforge-promtail
    volumes:
      - /var/log:/var/log:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - storyforge-network
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  # ── Prometheus (metrics) ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: storyforge-prometheus
    restart: unless-stopped
    networks:
      - storyforge-network
    ports:
      # Security: monitoring ports bound to localhost only
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    command: --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.retention.time=15d
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── Grafana (dashboards) ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: storyforge-grafana
    restart: unless-stopped
    networks:
      - storyforge-network
    ports:
      # Grafana is intentionally public-facing (login required — anonymous access disabled)
      # Consider restricting to localhost and proxying through nginx for extra hardening
      - "3000:3000"
    volumes:
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/storyforge.json:ro
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── Certbot (SSL auto-renewal) ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: storyforge-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./nginx/webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
